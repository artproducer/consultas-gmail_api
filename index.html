<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Consulta Inbox Pro</title>
    <!-- Assets -->
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <script>
        (() => {
            const THEME_KEY = 'query_theme';
            const savedTheme = localStorage.getItem(THEME_KEY);
            const theme = savedTheme === 'light' || savedTheme === 'dark'
                ? savedTheme
                : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.style.colorScheme = theme;
        })();
    </script>
    <!-- Local Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="wrap">
        <div class="header">
            <h1>Consulta <em>Inbox</em></h1>
        </div>

        <div id="main-search-card">
            <div class="top-toolbar">
                <div class="theme-control">
                    <button id="themeToggleBtn" class="theme-toggle" type="button" role="switch" aria-checked="false" aria-label="Cambiar a modo claro" title="Cambiar tema">
                        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M18 14.5A7.5 7.5 0 0 1 9.5 6a7.5 7.5 0 1 0 8.5 8.5z" fill="currentColor"/>
                        </svg>
                        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="12" cy="12" r="4" fill="currentColor"/>
                            <path d="M12 2.8v2.4M12 18.8v2.4M21.2 12h-2.4M5.2 12H2.8M18.5 5.5l-1.7 1.7M7.2 16.8l-1.7 1.7M18.5 18.5l-1.7-1.7M7.2 7.2 5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>

                <div id="authCard">
                    <div class="auth-status" id="authStatus">
                        <span>Desconectado</span>
                    </div>
                    <button id="authBtn" onclick="startAuth()" title="Conectar con Google">
                        <svg viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Search Form (Main focus) -->
            <div class="card" id="search-card">
                <form id="searchForm" onsubmit="event.preventDefault(); searchMails();">
                    <div class="field">
                        <label for="filterEmail">Filtrar por remitente</label>
                        <div class="input-row">
                            <div class="input-shell">
                                <input type="email" id="filterEmail" required placeholder="ejemplo@remitente.com"
                                    onkeyup="this.value=this.value.replace(/\s/g,'')"
                                    ondblclick="this.value='';this.focus();">
                                <span id="clearFilterBtn" class="clear-btn" title="Limpiar" onclick="clearFilterInput()">×</span>
                            </div>
                            <button type="button" class="paste-btn" title="Pegar" aria-label="Pegar correo" onclick="pasteFromClipboard()">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M11.6 3.8H6.1A2.2 2.2 0 0 0 3.9 6v10.2A2.2 2.2 0 0 0 6.1 18.4h.45M11.6 3.8h.6A2.2 2.2 0 0 1 14.3 6v.2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                                    <rect x="6.9" y="6.2" width="13.2" height="14.4" rx="2.6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                                    <rect x="10" y="9.6" width="3.3" height="3.3" rx="0.6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                                    <path d="M15.4 10.4h2.4M15.4 12.5h2.4M10 15.9h7.8M10 18.3h6.1" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="search-actions">
                        <button type="submit" class="btn-submit" id="submitBtn">
                            <span class="btn-submit-label">Buscar</span>
                            <span class="btn-submit-loader" aria-hidden="true">
                                <span class="btn-submit-dot"></span>
                                <span class="btn-submit-dot"></span>
                                <span class="btn-submit-dot"></span>
                            </span>
                        </button>
                        <button type="button" class="btn-secondary" id="pollingToggleBtn" onclick="togglePolling()">
                            Monitoreando
                        </button>
                    </div>
                </form>
            </div>

        </div>

        <!-- Dynamic Results -->
        <div class="results-head">
            <h2 style="font-size:0.9rem; font-weight:700; color:var(--text-dim); margin-bottom:0; display:flex; align-items:center;">
                RESULTADOS 
                <span id="liveStatus" class="live-dot" aria-hidden="true"></span>
            </h2>
            <div class="max-control max-control-results">
                <label for="maxResultsInput" class="max-label">MAX</label>
                <input type="number" id="maxResultsInput" value="5" min="1" inputmode="numeric">
            </div>
        </div>
        
        <div id="resultsContainer"></div>
    </div>

    <button id="backToTopBtn" class="back-to-top" title="Volver al inicio" aria-label="Volver al inicio">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 14l6-6 6 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <!-- Notification Overlay -->
    <div id="toast"></div>

    <!-- Local Logic -->
    <script src="script.js" defer></script>
</body>

</html>
