<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Consulta Inbox Pro</title>
    <!-- Assets -->
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <!-- Local Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="wrap">
        <div class="header">
            <h1>Consulta <em>Inbox</em></h1>
        </div>

        <div id="main-search-card">
            <!-- Search Form (Main focus) -->
            <div class="card" id="search-card">
                <form id="searchForm" onsubmit="event.preventDefault(); searchMails();">
                    <div class="field">
                        <label for="filterEmail">Filtrar por remitente</label>
                        <div class="input-row">
                            <input type="email" id="filterEmail" required placeholder="ejemplo@remitente.com"
                                onkeyup="this.value=this.value.replace(/\s/g,'')"
                                ondblclick="this.value='';this.focus();">
                            <span id="clearFilterBtn" class="clear-btn" title="Limpiar" onclick="clearFilterInput()">×</span>
                            <span class="paste-btn" title="Pegar" onclick="pasteFromClipboard()">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M9 4h6a1 1 0 0 1 1 1v2H8V5a1 1 0 0 1 1-1z" fill="currentColor"/>
                                    <rect x="6" y="7" width="12" height="13" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2.8"/>
                                    <path d="M10 11h4M10 14h4" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                                </svg>
                            </span>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" id="submitBtn">Buscar Correos</button>
                </form>
            </div>

            <!-- Authentication Area (Floating Icon) -->
            <div id="authCard">
                <div class="auth-status" id="authStatus">
                    <span>Desconectado</span>
                </div>
                <button id="authBtn" onclick="startAuth()" title="Conectar con Google">
                    <svg viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Status Indicator -->
        <div id="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- Dynamic Results -->
        <div class="results-head">
            <h2 style="font-size:0.9rem; font-weight:700; color:var(--text-dim); margin-bottom:0; display:flex; align-items:center;">
                RESULTADOS 
                <span id="liveStatus" class="live-dot" style="display:none; width:8px; height:8px; border-radius:50%; background:var(--green); margin-left:10px;"></span>
                <span id="resultsMaxInfo" style="margin-left:10px; font-size:0.66rem; color:var(--text-muted); font-weight:600;">MAX: 5</span>
            </h2>
            <div class="max-control max-control-results">
                <label for="maxResultsInput" class="max-label">MAX</label>
                <input type="number" id="maxResultsInput" value="5" min="1" max="5">
            </div>
        </div>
        
        <div id="resultsContainer"></div>
    </div>

    <button id="backToTopBtn" class="back-to-top" title="Volver al inicio" aria-label="Volver al inicio">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 14l6-6 6 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <!-- Notification Overlay -->
    <div id="toast"></div>

    <!-- Local Logic -->
    <script src="script.js" defer></script>
</body>

</html>
